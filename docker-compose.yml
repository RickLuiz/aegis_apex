version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: aegis
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data

  aegis-alpha:
    build: .
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - TZ=America/Sao_Paulo
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app  # <-- ESSA LINHA É A CHAVE
    command: python main.py

volumes:
  pgdata: